spring:
  docker:
    compose:
      enabled: true
      file: test-docker-compose.yml
      skip:
        in-tests: false
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5433/mission_control
    username: postgres
    password: admin
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  hikari:
      maximum-pool-size: ${POSTGRES_CONNECT_POOL_SIZE:2}
      minimum-idle: ${POSTGRES_CONNECT_MIN_IDLE:1}
      idle-timeout: ${POSTGRES_CONNECT_IDLE_TIMEOUT:600000}
      max-lifetime: ${POSTGRES_CONNECT_MAX_LIFETIME:1800000}
      connection-timeout: ${POSTGRES_CONNECT_CONNECT_TIMEOUT:10000}